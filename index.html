<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EstuFuel Pro Suite - CRM profesional para distribuidores Herbalife. Gestión de prospectos, ventas, catálogo y análisis de negocio.">
    <title>EstuFuel Pro Suite</title>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/global.css">
    
    <!-- Icons (Phosphor Icons - Modern SaaS standard) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="mainNav">
            <div class="brand-logo">
                <div class="brand-icon">
                    <i class="ph-bold ph-lightning"></i>
                </div>
                <span class="brand-text">EstuFuel Pro</span>
            </div>
            
            <div class="nav-section" id="navLinks">
                <div class="nav-section-label">Principal</div>
                
                <a href="#" class="nav-item active" data-module="dashboard">
                    <i class="ph ph-squares-four"></i>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-module="prospects">
                    <i class="ph ph-users"></i>
                    <span class="nav-label">Prospectos</span>
                </a>
                <a href="#" class="nav-item" data-module="sales">
                    <i class="ph ph-shopping-cart"></i>
                    <span class="nav-label">Ventas</span>
                </a>
                <a href="#" class="nav-item" data-module="catalog">
                    <i class="ph ph-package"></i>
                    <span class="nav-label">Catálogo</span>
                </a>
                <a href="#" class="nav-item" data-module="intelligence">
                    <i class="ph ph-chart-line-up"></i>
                    <span class="nav-label">Inteligencia</span>
                </a>
                <a href="#" class="nav-item" data-module="settings">
                    <i class="ph ph-gear"></i>
                    <span class="nav-label">Ajustes</span>
                </a>
            </div>
            
            <div class="nav-footer">
                <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem;">
                    <div class="avatar avatar-primary">E</div>
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-size: 0.8125rem; font-weight: 550; color: var(--color-text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">EstuFuel User</div>
                        <div style="font-size: 0.6875rem; color: var(--color-text-faint); display: flex; align-items: center; gap: 0.25rem;">
                            <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); display: inline-block;" class="animate-pulse"></span>
                            Conectado
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content" id="appContent">
            <!-- Dynamic content rendered here by modules -->
        </main>
    </div>

    <!-- Global Slide-over Modal -->
    <div class="slide-over-overlay" id="globalSlideOver">
        <div class="slide-over-panel">
            <div class="slide-over-header">
                <h2 id="slideOverTitle" style="font-size: 1.125rem;">Título</h2>
                <button class="btn btn-ghost" id="btnCloseSlideOver" style="padding: 0.375rem;">
                    <i class="ph ph-x" style="font-size: 1.25rem;"></i>
                </button>
            </div>
            <div class="slide-over-content" id="slideOverContent">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Gradient accent line at top -->
    <div class="gradient-accent" style="position: fixed; top: 0; left: 0; right: 0; z-index: 999;"></div>

    <!-- Application Logic (ES Modules) -->
    <script type="module" src="app.js"></script>
</body>
</html>
